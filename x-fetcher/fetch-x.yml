# Refresh tweets.json from the Olhar Factual X account via RapidAPI (twitter-api45).
# Reads the timeline and commits the result so GitHub Pages redeploys.
name: Fetch X posts

on:
  schedule:
    - cron: '17 * * * *'    # hourly (~720 calls/mo, under the 1000 free cap). Avoid */30 — that's ~1440/mo.
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed to commit tweets.json back to the repo

concurrency:
  group: fetch-x
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest posts
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          X_HANDLE: olharfactual
          # Write next to the published page so tweets.json AND its media/ folder
          # are served from the same origin. Adjust if Pages serves another dir.
          OUT_PATH: olhar-factual/site/tweets.json
          MAX_POSTS: '20'
          # MEDIA_DIR defaults to <dir of OUT_PATH>/media → olhar-factual/site/media
          # MEDIA_PUBLIC defaults to 'media' → relative path the page resolves itself
        run: node x-fetcher/fetch.mjs

      - name: Show what was downloaded
        run: |
          echo "tweets.json:" && ls -la olhar-factual/site/tweets.json || echo "  (missing!)"
          echo "media/:" && ls -la olhar-factual/site/media || echo "  (no media dir — images fell back to remote URLs, see the fetch step log)"
          # If this lists files but they don't appear in the repo, a .gitignore is
          # dropping them — the -f below forces them in.

      - name: Commit if changed
        run: |
          # -f forces past any .gitignore (e.g. a global *.jpg / media/ rule) that
          # would otherwise silently skip the images so only the JSON gets committed.
          git add -f olhar-factual/site/tweets.json olhar-factual/site/media || true
          if [[ -n "$(git status --porcelain olhar-factual/site/tweets.json olhar-factual/site/media)" ]]; then
            git config user.name  "olhar-factual-bot"
            git config user.email "actions@users.noreply.github.com"
            git commit -m "chore: refresh tweets.json + media [skip ci]"
            git push
          else
            echo "No changes."
          fi
